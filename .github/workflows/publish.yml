name: Publish to PyPI

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version number (e.g. 1.0.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Update version in all files
        run: |
          VERSION="${{ inputs.version }}"
          echo "Updating version to $VERSION..."

          # Update pyproject.toml
          sed -i "s/^version = .*/version = \"$VERSION\"/" pyproject.toml

          # Update __init__.py
          sed -i "s/^__version__ = .*/__version__ = \"$VERSION\"/" src/themis_mcp/__init__.py

          # Update test
          sed -i "s/assert themis_mcp.__version__ == .*/assert themis_mcp.__version__ == \"$VERSION\"/" tests/test_basic.py

          echo "Version updated in:"
          grep "^version" pyproject.toml
          grep "^__version__" src/themis_mcp/__init__.py
          grep "__version__" tests/test_basic.py

      - name: Install build tools
        run: pip install build twine

      - name: Build package
        run: python -m build

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: twine upload dist/*

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          name: v${{ inputs.version }}
          generate_release_notes: true
          files: dist/*

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml src/themis_mcp/__init__.py tests/test_basic.py
          git commit -m "chore: bump version to ${{ inputs.version }}" || echo "No changes to commit"
          git push
